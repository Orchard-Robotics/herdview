<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>herdview</title>
<style>
  :root {
    --bg:#f2f5f3; --surface:#fff; --surface-2:#eaeeeb; --border:#d7ded9;
    --ink:#171b1e; --muted:#55606a; --faint:#8b95a0;
    --accent:#2b7563; --accent-ink:#1f5749; --accent-soft:#e0efe9;
    --working:#9a6716; --working-soft:#f4ead4;
    --blocked:#a83535; --blocked-soft:#f6e3e3;
    --idle:#2f8a57; --idle-soft:#e2f0e8;
    --term-bg:#f4f6f4;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#0f1216; --surface:#161b21; --surface-2:#1d232b; --border:#29303a;
      --ink:#e6eaee; --muted:#99a3ae; --faint:#69737e;
      --accent:#4fb89d; --accent-ink:#7fd3bd; --accent-soft:#15291f;
      --working:#e0a339; --working-soft:#2a2314;
      --blocked:#e06a6a; --blocked-soft:#2c1a1a;
      --idle:#6bc98a; --idle-soft:#152a1e;
      --term-bg:#0b0e12;
    }
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}  /* stop iOS inflating long messages */
  html,body{height:100%;overflow-x:hidden;overscroll-behavior:none;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;
    position:fixed;top:0;right:0;bottom:0;left:0;overflow:hidden;}
  #root{display:flex;flex-direction:column;flex:1;min-height:0;}
  header{flex:0 0 auto;z-index:2;background:color-mix(in srgb,var(--bg) 88%,transparent);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--border);
    padding:calc(env(safe-area-inset-top) + .8rem) 1.1rem .8rem;
    display:flex;align-items:center;gap:.7rem;}
  h1{font-size:1.12rem;letter-spacing:-.01em;margin:0;font-weight:640;flex:1;}
  h1 .g{color:var(--accent);}
  .count{font-family:var(--mono);font-size:.72rem;color:var(--muted);}
  .back{appearance:none;border:1px solid var(--border);background:var(--surface);color:var(--ink);
    font-family:var(--mono);font-size:.8rem;border-radius:8px;padding:.35rem .6rem;cursor:pointer;}
  .back:active{transform:translateY(1px);}

  main{max-width:660px;margin:0 auto;padding:1rem 1.1rem;width:100%;flex:1;min-height:0;
    display:flex;flex-direction:column;gap:.7rem;overflow:hidden;}
  .scroller{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;touch-action:pan-y;
    -webkit-overflow-scrolling:touch;display:flex;flex-direction:column;gap:.7rem;padding-bottom:.5rem;}

  /* responsive master-detail split (wide only; mobile stays single-column) */
  .split{flex:1;min-height:0;display:flex;flex-direction:column;}
  .pane-list,.pane-detail{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;}
  .split[data-sel="0"] .pane-detail{display:none;}
  .split[data-sel="1"] .pane-list{display:none;}
  .pane-empty{flex:1;display:flex;align-items:center;justify-content:center;
    color:var(--muted);font-size:.9rem;font-family:var(--mono);}
  @media(min-width:820px){
    main.wide-split{max-width:1120px;}
    .split{flex-direction:row;gap:1.1rem;}
    .split .pane-list{display:flex!important;flex:0 0 340px;min-width:0;}
    .split .pane-detail{display:flex!important;flex:1;min-width:0;
      border-left:1px solid var(--border);padding-left:1.1rem;}
  }

  /* grid */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:13px;
    padding:.9rem 1rem;box-shadow:0 1px 2px rgba(0,0,0,.05);display:flex;flex-direction:column;gap:.45rem;
    border-left:3px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .card:active{transform:scale(.995);}
  .card.blocked{border-left-color:var(--blocked);}
  .card.working{border-left-color:var(--working);}
  .card.idle{border-left-color:var(--idle);}
  .row{display:flex;align-items:center;justify-content:space-between;gap:.6rem;}
  .name{font-weight:620;font-size:1rem;}
  .name .chev{color:var(--faint);font-weight:400;}
  .path{font-family:var(--mono);font-size:.74rem;color:var(--faint);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .branch{font-family:var(--mono);font-size:.72rem;color:var(--accent-ink);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .group{font-family:var(--mono);font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;
    color:var(--accent-ink);padding:.45rem .2rem .1rem;position:sticky;top:0;background:var(--bg);z-index:1;}
  .newwt{appearance:none;border:1px solid var(--border);background:var(--surface);color:var(--accent-ink);
    font-size:1.05rem;line-height:1;border-radius:8px;padding:.15rem .5rem;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .newwt:active{transform:translateY(1px);}
  .sheet-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:10;display:flex;align-items:flex-end;justify-content:center;}
  .sheet{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-width:660px;
    padding:.8rem .8rem calc(env(safe-area-inset-bottom) + .8rem);display:flex;flex-direction:column;gap:.5rem;}
  .sheet-h{font-family:var(--mono);font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);
    padding:.3rem .4rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .sheet-b{appearance:none;text-align:left;border:1px solid var(--border);background:var(--surface);color:var(--ink);
    border-radius:12px;padding:.75rem .85rem;font-size:.98rem;font-weight:620;cursor:pointer;
    display:flex;flex-direction:column;gap:.15rem;-webkit-tap-highlight-color:transparent;}
  .sheet-b span{font-weight:400;font-size:.78rem;color:var(--muted);}
  .sheet-b.cancel{text-align:center;font-weight:500;color:var(--muted);}
  .sheet-b:active{transform:scale(.99);}
  .toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 4.6rem);
    transform:translateX(-50%) translateY(8px);background:var(--ink);color:var(--bg);
    font-size:.85rem;font-weight:600;padding:.5rem .95rem;border-radius:999px;white-space:nowrap;
    box-shadow:0 6px 18px rgba(0,0,0,.28);opacity:0;pointer-events:none;z-index:20;
    transition:opacity .15s ease, transform .15s ease;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  @media(prefers-reduced-motion:reduce){.toast{transition:opacity .15s ease;}}
  .pill{font-family:var(--mono);font-size:.66rem;letter-spacing:.06em;text-transform:uppercase;
    padding:.22rem .55rem;border-radius:999px;display:inline-flex;align-items:center;gap:.38rem;white-space:nowrap;}
  .pill .dot{width:.5rem;height:.5rem;border-radius:50%;}
  .pill.blocked{background:var(--blocked-soft);color:var(--blocked);} .pill.blocked .dot{background:var(--blocked);}
  .pill.working{background:var(--working-soft);color:var(--working);} .pill.working .dot{background:var(--working);animation:pulse 1.1s ease-in-out infinite;}
  .pill.idle{background:var(--idle-soft);color:var(--idle);} .pill.idle .dot{background:var(--idle);}
  .pill.unknown{background:var(--surface-2);color:var(--muted);} .pill.unknown .dot{background:var(--faint);}
  .meta{font-family:var(--mono);font-size:.72rem;color:var(--muted);display:flex;justify-content:space-between;align-items:center;gap:.5rem;}
  .rename{appearance:none;border:none;background:transparent;color:var(--accent-ink);cursor:pointer;
    font-family:var(--mono);font-size:.68rem;padding:.15rem .3rem;-webkit-tap-highlight-color:transparent;}
  .rename:active{opacity:.6;}
  .focus{color:var(--accent-ink);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  @media(prefers-reduced-motion:reduce){.pill .dot{animation:none!important;}}
  .empty,.error{text-align:center;color:var(--muted);font-size:.9rem;padding:2.5rem 1rem;}
  .error{color:var(--blocked);font-family:var(--mono);font-size:.78rem;}

  /* detail */
  .detail{display:flex;flex-direction:column;gap:.7rem;flex:1;min-height:0;}
  .artifacts{flex:0 0 auto;border:1px solid var(--border);border-radius:11px;background:var(--surface);overflow:hidden;}
  .art-h{appearance:none;border:none;background:transparent;color:var(--accent-ink);width:100%;text-align:left;font-weight:600;
    font-family:var(--mono);font-size:.74rem;padding:.5rem .7rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;-webkit-tap-highlight-color:transparent;}
  .art-h .chev{color:var(--faint);font-weight:400;}
  .art-list{display:flex;flex-direction:column;max-height:30vh;overflow-y:auto;border-top:1px solid var(--border);}
  .art-item{padding:.5rem .7rem;font-family:var(--mono);font-size:.76rem;color:var(--accent-ink);
    text-decoration:none;border-top:1px solid var(--border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .art-item:first-child{border-top:none;}
  .art-item:active{background:var(--surface-2);}
  .term{background:var(--term-bg);border:1px solid var(--border);border-radius:11px;
    padding:.8rem .9rem;font-family:var(--mono);font-size:.76rem;line-height:1.5;color:var(--ink);
    white-space:pre-wrap;word-break:break-word;overflow-y:auto;
    height:min(52vh,420px);}
  .convo{flex:1;min-height:0;border:1px solid var(--border);border-radius:14px;background:var(--surface-2);
    padding:.85rem .7rem;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;touch-action:pan-y;
    display:flex;flex-direction:column;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;}
  .msg{display:flex;max-width:82%;margin-top:.5rem;}
  .msg.grouped{margin-top:.14rem;}
  .msg.pending{opacity:.55;}
  .msg.user{align-self:flex-end;justify-content:flex-end;}
  .msg.assistant{align-self:flex-start;}
  .bubble{padding:.5rem .72rem;border-radius:17px;font-size:.9rem;line-height:1.42;
    white-space:pre-wrap;word-break:break-word;box-shadow:0 1px 1px rgba(0,0,0,.06);}
  .msg.user .bubble{background:var(--accent);color:#fff;border-bottom-right-radius:5px;}
  .msg.assistant .bubble{background:var(--surface);border:1px solid var(--border);color:var(--ink);border-bottom-left-radius:5px;}
  .bubble a{color:inherit;text-decoration:underline;text-underline-offset:2px;word-break:break-all;}
  .msg.assistant .bubble a{color:var(--accent-ink);}
  .convo pre.term a{color:var(--accent-ink);word-break:break-all;}
  .bubble .md-p{margin:0;}
  .bubble .md-p + .md-p, .bubble .md-p + .md-list, .bubble .md-list + .md-p, .bubble .md-h{margin-top:.45rem;}
  .bubble .md-h{font-weight:650;}
  .bubble .md-list{margin:.35rem 0;padding-left:1.25rem;}
  .bubble .md-list li{margin:.12rem 0;}
  .bubble strong{font-weight:650;}
  .bubble em{font-style:italic;}
  .bubble code{font-family:var(--mono);font-size:.82em;background:var(--surface-2);border:1px solid var(--border);
    border-radius:5px;padding:.04em .32em;}
  /* Wrap code instead of horizontal-scrolling it: Moshi's webview eats sideways
     swipes, so wrapping is the only reliable way to see the whole thing. */
  .bubble pre.md-code{background:var(--code-bg);border:1px solid var(--border);border-radius:9px;
    padding:.55rem .7rem;margin:.4rem 0;max-width:100%;overflow-x:hidden;}
  .bubble pre.md-code, .bubble pre.md-code code{white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word;}
  .bubble pre.md-code code{background:none;border:none;padding:0;font-size:.8em;display:block;}
  .msg.user .bubble code,.msg.user .bubble pre.md-code{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);}
  .tools{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.4rem;}
  .toolchip{font-family:var(--mono);font-size:.63rem;background:var(--surface-2);border:1px solid var(--border);
    color:var(--muted);border-radius:6px;padding:.12rem .4rem;}
  .msg.user .toolchip{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.28);color:#fff;}
  .sys{align-self:center;font-family:var(--mono);font-size:.65rem;color:var(--muted);
    background:var(--surface);border:1px solid var(--border);border-radius:999px;
    padding:.22rem .62rem;margin-top:.5rem;max-width:90%;text-align:center;}
  .typing{align-self:flex-start;display:flex;gap:.28rem;align-items:center;margin-top:.5rem;
    padding:.62rem .82rem;background:var(--surface);border:1px solid var(--border);
    border-radius:17px;border-bottom-left-radius:5px;
    appearance:none;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .typing:active{transform:scale(.97);}
  .runpanel .pend{display:flex;flex-direction:column;gap:.2rem;}
  .runpanel .preview{margin-top:.4rem;}
  .typing span{width:.44rem;height:.44rem;border-radius:50%;background:var(--faint);animation:blink 1.3s infinite;}
  .typing span:nth-child(2){animation-delay:.18s;} .typing span:nth-child(3){animation-delay:.36s;}
  @keyframes blink{0%,70%,100%{opacity:.25;transform:translateY(0);}35%{opacity:1;transform:translateY(-2px);}}
  .convo pre.term{margin:0;width:100%;font-family:var(--mono);font-size:.75rem;line-height:1.5;
    white-space:pre-wrap;word-break:break-word;color:var(--ink);}
  .msgs{display:flex;flex-direction:column;}
  .statusslot{display:flex;flex-direction:column;gap:.4rem;}
  .statusslot:empty{display:none;}
  .actpill{align-self:flex-start;margin-top:0;font-family:var(--mono);font-size:.72rem;
    color:var(--working);background:var(--working-soft);border:1px solid var(--working);
    border-radius:999px;padding:.34rem .72rem;display:inline-flex;align-items:center;gap:.4rem;
    appearance:none;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .actpill:active{transform:scale(.97);}
  .runpanel{align-self:stretch;margin-top:.4rem;background:var(--working-soft);border:1px solid var(--working);
    border-radius:12px;padding:.75rem .85rem;}
  .runpanel .permh{color:var(--working);}
  .runhead{display:flex;justify-content:space-between;align-items:center;}
  .minbtn{appearance:none;border:none;background:transparent;color:var(--working);
    font-size:.95rem;line-height:1;cursor:pointer;padding:.1rem .35rem;margin:-.2rem -.2rem 0 0;}
  @media(prefers-reduced-motion:reduce){.typing span{animation:none!important;}.convo{scroll-behavior:auto!important;}}
  .keys{display:flex;flex-direction:column;gap:.5rem;}
  .keys:empty{display:none;}
  .permcard{background:var(--blocked-soft);border:1px solid var(--blocked);border-radius:12px;padding:.75rem .85rem;}
  .permh{font-family:var(--mono);font-size:.68rem;letter-spacing:.05em;color:var(--blocked);margin-bottom:.35rem;}
  .permname{font-weight:640;font-size:.92rem;}
  .permcmd{margin:.35rem 0 0;background:var(--code-bg);border:1px solid var(--border);border-radius:8px;
    padding:.55rem .65rem;font-family:var(--mono);font-size:.76rem;line-height:1.45;
    white-space:pre-wrap;word-break:break-word;overflow:auto;max-height:38vh;}
  .permbtns{display:flex;flex-wrap:wrap;gap:.45rem;}
  .permbtns.choices{flex-direction:column;}
  .permbtns.choices .key{text-align:left;width:100%;transition:opacity .15s ease;}
  .permbtns.choices .key.chosen{background:var(--accent);color:#fff;border-color:transparent;font-weight:640;}
  .permbtns.choices .key.dimmed{opacity:.38;}
  .key{appearance:none;border:1px solid var(--border);background:var(--surface);color:var(--ink);
    font-family:var(--mono);font-size:.78rem;border-radius:9px;padding:.5rem .7rem;cursor:pointer;}
  .key:active{transform:translateY(1px);}
  .key.go{background:var(--accent);color:#fff;border-color:transparent;}
  .key.warn{background:var(--blocked-soft);color:var(--blocked);border-color:transparent;}
  .prompt{display:flex;gap:.5rem;align-items:flex-end;
    position:sticky;bottom:0;padding-bottom:calc(env(safe-area-inset-bottom) + .3rem);}
  .prompt textarea{flex:1;resize:none;border:1px solid var(--border);border-radius:11px;
    background:var(--surface);color:var(--ink);font-family:var(--sans);font-size:.95rem;
    padding:.65rem .8rem;min-height:2.7rem;max-height:8rem;}
  .prompt textarea:focus{outline:2px solid var(--accent);outline-offset:1px;}
  .send{appearance:none;border:none;background:var(--accent);color:#fff;font-weight:600;
    border-radius:11px;padding:0 1rem;height:2.7rem;cursor:pointer;font-size:.95rem;}
  .send:disabled{opacity:.5;}
  .hint{font-family:var(--mono);font-size:.68rem;color:var(--faint);text-align:center;}
  footer{max-width:660px;margin:1rem auto 1.5rem;padding:0 1.1rem;font-family:var(--mono);
    font-size:.68rem;color:var(--faint);text-align:center;}
</style>

<!-- Map the bare "preact" specifier the vendored hooks module imports to the
     local file, so everything loads offline with no build step. -->
<script type="importmap">
{ "imports": { "preact": "./vendor/preact.module.js" } }
</script>
<script type="module">
  import { h, render, Fragment } from "preact";
  import { useState, useEffect, useRef, useLayoutEffect } from "./vendor/hooks.module.js";
  import htm from "./vendor/htm.module.js";
  const html = htm.bind(h);

  const STATE_ORDER = { blocked:0, working:1, idle:2, unknown:3 };

  const shortPath = p => { if(!p) return ""; const a=p.split("/").filter(Boolean); return a.length<=2?p:"…/"+a.slice(-2).join("/"); };
  // w3:p1 → "workspace 3 · pane 1" (raw id kept as tooltip)
  const prettyPane = id => { const m = /^w([0-9A-Za-z]+):p([0-9A-Za-z]+)$/.exec(id || ""); return m ? `workspace ${m[1]} · pane ${m[2]}` : (id || ""); };

  // brief confirmation pill so taps feel acknowledged before the next poll.
  // Kept imperative (appended to <body>) so it lives outside the Preact tree.
  function toast(msg){
    let t = document.getElementById("hv-toast");
    if(!t){ t = document.createElement("div"); t.id = "hv-toast"; t.className = "toast"; document.body.appendChild(t); }
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(t._h);
    t._h = setTimeout(() => t.classList.remove("show"), 1500);
  }

  // Append text to a node, turning http(s) URLs into real links. Built as DOM
  // nodes (never innerHTML) and restricted to http/https — no injection surface.
  function linkify(parent, text){
    const re = /(https?:\/\/[^\s<>]+)/g;
    let last = 0, m;
    while((m = re.exec(text)) !== null){
      let url = m[0];
      const trail = url.match(/[.,;:!?)\]}'"]+$/);   // don't swallow trailing punctuation
      if(trail) url = url.slice(0, -trail[0].length);
      if(!url){ continue; }
      const start = m.index, end = start + url.length;
      if(start > last) parent.appendChild(document.createTextNode(text.slice(last, start)));
      const a = document.createElement("a");
      a.href = url; a.textContent = url; a.target = "_blank"; a.rel = "noopener noreferrer";
      parent.appendChild(a);
      last = end; re.lastIndex = end;
    }
    if(last < text.length) parent.appendChild(document.createTextNode(text.slice(last)));
  }

  // --- minimal, safe markdown rendering (DOM nodes only; http/https links) ---
  function mdEmph(parent, text){
    const re = /(\*\*([^*]+)\*\*|__([^_]+)__|\*([^*]+)\*|_([^_]+)_)/g;
    let last = 0, m;
    while((m = re.exec(text)) !== null){
      if(m.index > last) linkify(parent, text.slice(last, m.index));
      const bold = m[2] !== undefined || m[3] !== undefined;
      const el = document.createElement(bold ? "strong" : "em");
      el.textContent = m[2] ?? m[3] ?? m[4] ?? m[5];
      parent.appendChild(el);
      last = m.index + m[0].length;
    }
    if(last < text.length) linkify(parent, text.slice(last));
  }
  function mdInline(parent, text){
    text.split(/(`[^`]+`)/g).forEach((seg, idx) => {
      if(idx % 2 === 1){ const c = document.createElement("code"); c.textContent = seg.slice(1, -1); parent.appendChild(c); return; }
      const lre = /\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g;
      let last = 0, m;
      while((m = lre.exec(seg)) !== null){
        if(m.index > last) mdEmph(parent, seg.slice(last, m.index));
        const a = document.createElement("a"); a.href = m[2]; a.textContent = m[1]; a.target = "_blank"; a.rel = "noopener noreferrer";
        parent.appendChild(a); last = m.index + m[0].length;
      }
      if(last < seg.length) mdEmph(parent, seg.slice(last));
    });
  }
  function renderMarkdown(parent, text){
    const lines = (text || "").split("\n");
    let i = 0, list = null;
    const closeList = () => { if(list){ parent.appendChild(list); list = null; } };
    while(i < lines.length){
      const line = lines[i];
      if(/^\s*```/.test(line)){                                   // fenced code
        closeList(); i++; const buf = [];
        while(i < lines.length && !/^\s*```\s*$/.test(lines[i])){ buf.push(lines[i]); i++; }
        i++;
        const pre = document.createElement("pre"); pre.className = "md-code";
        const code = document.createElement("code"); code.textContent = buf.join("\n");
        pre.appendChild(code); parent.appendChild(pre); continue;
      }
      const hd = line.match(/^(#{1,6})\s+(.*)$/);
      if(hd){ closeList(); const d = document.createElement("div"); d.className = "md-h"; mdInline(d, hd[2]); parent.appendChild(d); i++; continue; }
      const bul = line.match(/^\s*[-*+]\s+(.*)$/), ord = line.match(/^\s*\d+\.\s+(.*)$/);
      if(bul || ord){
        const tag = bul ? "ul" : "ol";
        if(!list || list.tagName.toLowerCase() !== tag){ closeList(); list = document.createElement(tag); list.className = "md-list"; }
        const li = document.createElement("li"); mdInline(li, bul ? bul[1] : ord[1]); list.appendChild(li); i++; continue;
      }
      closeList();
      if(line.trim() === ""){ i++; continue; }
      const para = document.createElement("div"); para.className = "md-p"; let first = true;
      while(i < lines.length && lines[i].trim() !== "" && !/^\s*```/.test(lines[i]) &&
            !/^#{1,6}\s+/.test(lines[i]) && !/^\s*[-*+]\s+/.test(lines[i]) && !/^\s*\d+\.\s+/.test(lines[i])){
        if(!first) para.appendChild(document.createElement("br"));
        mdInline(para, lines[i]); first = false; i++;
      }
      parent.appendChild(para);
    }
    closeList();
  }

  async function api(path, opts){ const r = await fetch(path,{cache:"no-store",...opts}); if(!r.ok) throw new Error("HTTP "+r.status); return r; }

  // Per-pane compose drafts, persisted so a failed send (or a webview reload /
  // Moshi reconnect) never loses what you typed. localStorage may be unavailable
  // in some webviews, so every access is guarded.
  const draftKey = p => "herdview:draft:" + p;
  function saveDraft(p, v){ try{ v ? localStorage.setItem(draftKey(p), v) : localStorage.removeItem(draftKey(p)); }catch{} }
  function loadDraft(p){ try{ return localStorage.getItem(draftKey(p)) || ""; }catch{ return ""; } }
  function clearDraft(p){ try{ localStorage.removeItem(draftKey(p)); }catch{} }

  // Sent-but-unconfirmed messages persisted per session+pane, so a browser
  // refresh doesn't lose a pending send (e.g. one Claude has queued and not yet
  // written to the transcript). Capped so it can't grow without bound.
  const sentKey = (session, pane) => "herdview:sent:" + (session||"") + ":" + pane;
  const SENT_TTL = 5*60*1000;   // a pending send auto-clears after this, so a pane without a transcript can't accumulate grey bubbles forever
  function loadSent(session, pane){
    try{
      const now = Date.now();
      return (JSON.parse(localStorage.getItem(sentKey(session,pane)) || "[]"))
        .map(e => typeof e === "string" ? {t:e, ts:now} : e)      // migrate old string entries
        .filter(e => e && e.t && (now - (e.ts||0) < SENT_TTL));
    }catch{ return []; }
  }
  function saveSent(session, pane, arr){ try{ const a=arr.slice(-40); a.length ? localStorage.setItem(sentKey(session,pane), JSON.stringify(a)) : localStorage.removeItem(sentKey(session,pane)); }catch{} }

  // Artifact links the agent produces — collected (deduped, persisted, accumulating
  // so they don't roll off with the transcript tail) and opened in a new tab, since
  // claude.ai artifacts can't be embedded (X-Frame-Options: SAMEORIGIN).
  const ARTIFACT_RE = /https?:\/\/claude\.ai\/(?:code\/artifact|public\/artifacts)\/[A-Za-z0-9-]+/g;
  const artKey = (session, pane) => "herdview:artifacts:" + (session||"") + ":" + pane;
  const artLabel = u => { const m = u.match(/\/([A-Za-z0-9-]+)\/?$/); return "artifact · " + (m ? m[1].slice(0,8) : u); };
  function loadArtifacts(session, pane){ try{ return JSON.parse(localStorage.getItem(artKey(session,pane)) || "[]"); }catch{ return []; } }
  function saveArtifacts(session, pane, arr){ try{ const a=arr.slice(-50); a.length ? localStorage.setItem(artKey(session,pane), JSON.stringify(a)) : localStorage.removeItem(artKey(session,pane)); }catch{} }

  // Demo mode: when served without a backend (as an artifact), render baked-in
  // sample data so the UI is testable from a link. Never true on the local http
  // server (localhost/tailnet are plain http, not a claude.ai host).
  const DEMO = /(^|\.)claude(usercontent)?\.ai$|anthropic\.com$/.test(location.hostname)
            || new URLSearchParams(location.search).has("demo");
  const DEMO_DATA = {
    agents: [
      {pane_id:"w1:p5", workspace_id:"w1", agent:"claude", agent_status:"blocked",  cwd:"/home/dev/code/acme-api", branch:"fix/login-bug", focused:false},
      {pane_id:"w3:p1", workspace_id:"w3", agent:"claude", agent_status:"working",  cwd:"/home/dev/code/acme-api", branch:"feat/checkout-flow", focused:true},
      {pane_id:"w1:p1", workspace_id:"w1", agent:"claude", agent_status:"idle",     cwd:"/home/dev/code/acme-web", branch:"main", focused:false}
    ],
    transcripts: {
      "w3:p1": { session_id:"demo", messages:[
        {role:"user", text:"can you add clickable links and render markdown in the chat?"},
        {role:"assistant", text:"Yes — done. Here's what changed:\n\n- **Clickable links** like https://herdr.dev open in a new tab\n- *Markdown*: **bold**, `inline code`, lists, and fenced code blocks\n\n```go\nfunc main() {\n    http.ListenAndServe(\":8848\", nil)\n}\n```\n\nRefresh and tap an agent to see it."},
        {role:"assistant", tools:[{name:"Bash", summary:"go build -o herdview ./cmd/herdview"}]}
      ]},
      "w1:p5": { session_id:"demo2", messages:[
        {role:"user", text:"run the checkout tests"},
        {role:"assistant", text:"Running the test suite now."},
        {role:"assistant", tools:[{name:"Bash", summary:"npm test -- --runInBand src/checkout"}]}
      ]}
    },
    reads: { "w1:p1": "(idle — no recent output)", "w3:p1": "✳ Vibing… (34s · ↓ 3.1k tokens)" }
  };

  async function fetchAgents(){
    if(DEMO) return DEMO_DATA.agents;
    return await (await api("/api/agents")).json();
  }
  // pane ids collide across sessions, so every pane op is qualified by session.
  const pq = (pane, session) => "pane="+encodeURIComponent(pane)+(session?"&session="+encodeURIComponent(session):"");
  async function fetchTranscript(pane, session){
    if(DEMO) return DEMO_DATA.transcripts[pane] || null;
    const r = await fetch("/api/pane/transcript?"+pq(pane,session),{cache:"no-store"});
    return r.ok ? await r.json() : null;
  }
  async function fetchRead(pane, session){
    if(DEMO) return DEMO_DATA.reads[pane] || "(no output)";
    return await (await api("/api/pane/read?"+pq(pane,session))).text();
  }
  async function sendMsg(pane, session, text){
    if(DEMO) return;
    await api("/api/pane/send?"+pq(pane,session), {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text})});
  }
  async function sendKeys(pane, session, keys){
    if(DEMO) return;
    await api("/api/pane/key?"+pq(pane,session), {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({keys})});
  }
  async function sendRename(pane, session, name){
    if(DEMO){ const a=DEMO_DATA.agents.find(x=>x.pane_id===pane); if(a){ if(name) a.name=name; else delete a.name; } return; }
    await api("/api/pane/rename?"+pq(pane,session), {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name})});
  }
  async function sendNewWorktree(cwd, name, session){
    if(DEMO){ DEMO_DATA.agents.unshift({pane_id:"w9:p1",workspace_id:"w9",agent:"claude",agent_status:"working",cwd,branch:name,focused:false}); return; }
    await api("/api/worktree", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({cwd,name,session})});
  }
  async function sendNewAgent(cwd, session){
    if(DEMO){ DEMO_DATA.agents.unshift({pane_id:"w9:p2",workspace_id:"w9",agent:"claude",agent_status:"working",cwd,branch:(DEMO_DATA.agents[0]||{}).branch,focused:false}); return; }
    await api("/api/agent", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({cwd,session})});
  }

  // The most recent tool_use turn still awaiting a result (walking back until a
  // user turn). Labels the activity indicator and the blocked-permission card.
  function lastPending(msgs){
    for(let i=(msgs||[]).length-1; i>=0; i--){ const m=msgs[i]; if(m.role==="user") break; if(m.role==="assistant" && m.tools && m.tools.length) return m.tools; }
    return null;
  }
  // Quick "thinking" blip vs a longer run. Elapsed is measured from when this
  // working episode began, so the dots always show first and the pill appears
  // once it crosses the threshold. The tool name (if mid tool_use) labels it.
  function activityFor(status, msgs, since){
    if(status !== "working") return null;
    const act = {};
    const pend = lastPending(msgs || []);
    if(pend && pend.length){ act.tool = pend.map(t=>t.name).join(" · "); act.pending = pend; }
    if(since) act.elapsed = Math.floor((Date.now() - since) / 1000);
    return act;
  }
  function fmtElapsed(s){ return s < 60 ? s+"s" : Math.floor(s/60)+"m "+String(s%60).padStart(2,"0")+"s"; }
  function pillLabel(act){
    let t = act.tool ? ("⚙ "+act.tool) : "✳ Working";
    if(act.elapsed != null) t += " · " + fmtElapsed(act.elapsed);
    return t + "  ▸";                                  // always a tap affordance
  }
  // Aggregate agents into per-session summaries; keys sorted blocked-first.
  function sessionSummary(agents){
    const map = {}, order = [];
    for(const a of agents){ const k = a.session || ""; if(!map[k]){ map[k]={n:0,blocked:0,working:0}; order.push(k); } map[k].n++; if(a.agent_status==="blocked") map[k].blocked++; else if(a.agent_status==="working") map[k].working++; }
    const keys = order.sort((x,y)=>(map[x].blocked?0:1)-(map[y].blocked?0:1) || x.localeCompare(y));
    return { map, keys };
  }

  // Renders text into an owned DOM node via the XSS-safe imperative builders
  // (linkify / renderMarkdown). The vnode carries no children, so Preact never
  // touches what we append here; the effect only re-runs when the text changes.
  function Rendered({ text, markdown, tag, className }){
    const ref = useRef(null);
    useLayoutEffect(() => {
      const el = ref.current; if(!el) return;
      el.textContent = "";
      if(markdown) renderMarkdown(el, text || ""); else linkify(el, text || "");
    }, [text, markdown]);
    return h(tag || "div", { ref, class: className });
  }

  function Bubble({ m, grouped, pending }){
    const role = m.role === "user" ? "user" : "assistant";
    const cls = "msg " + role + (grouped ? " grouped" : "") + (pending ? " pending" : "");
    return html`<div class=${cls}>
      <div class="bubble">
        ${m.text ? html`<${Rendered} text=${m.text} markdown=${role === "assistant"} />` : null}
        ${m.tools && m.tools.length ? html`<div class="tools">
          ${m.tools.map((t, i) => html`<span class="toolchip" key=${i} title=${t.summary || undefined}>⚙ ${t.name}</span>`)}
        </div>` : null}
      </div>
    </div>`;
  }

  function AgentCard({ a, showBranch, onSelect, onRename }){
    const s = a.agent_status || "unknown";
    return html`<div class=${"card " + s} data-pane=${a.pane_id} data-session=${a.session || ""} onClick=${() => onSelect(a)}>
      <div class="row">
        <span class="name">${(a.name || a.agent) || "agent"} <span class="chev">›</span></span>
        <span class=${"pill " + s}><span class="dot"></span>${s}</span>
      </div>
      <div class="path">${shortPath(a.cwd)}</div>
      ${showBranch && a.branch ? html`<div class="branch">⎇ ${a.branch}</div>` : null}
      <div class="meta">
        <span title=${a.pane_id}>${prettyPane(a.pane_id)}${a.focused ? html` · <span class="focus">focused</span>` : ""}</span>
        <button class="rename" type="button" onClick=${e => { e.stopPropagation(); onRename(a); }}>✎ rename</button>
      </div>
    </div>`;
  }

  function SessionCard({ name, info, onClick }){
    const s = info.blocked ? "blocked" : (info.working ? "working" : "idle");
    return html`<div class=${"card " + s} data-session-name=${name} onClick=${onClick}>
      <div class="row">
        <span class="name">▸ ${name || "session"} <span class="chev">›</span></span>
        <span class=${"pill " + s}><span class="dot"></span>${info.n} agent${info.n === 1 ? "" : "s"}</span>
      </div>
      ${info.blocked ? html`<div class="path">${info.blocked} need you</div>` : null}
    </div>`;
  }

  // Agent grid for one session; branch-grouped only when there's more than one.
  function Grid({ agents, onSelect, onRename }){
    if(!agents.length) return html`<div class="empty">No agents in this session.</div>`;
    const groups = {};
    for(const a of agents){ const k = a.branch || "no branch"; (groups[k] = groups[k] || []).push(a); }
    const keys = Object.keys(groups).sort((x,y)=>(groups[x].some(a=>a.agent_status==="blocked")?0:1)-(groups[y].some(a=>a.agent_status==="blocked")?0:1) || x.localeCompare(y));
    const grouped = keys.length > 1;
    return html`<div class="scroller">
      ${keys.map(k => html`
        ${grouped ? html`<div class="group" key=${"g:" + k}>⎇ ${k} · ${groups[k].length}</div>` : null}
        ${groups[k].map(a => html`<${AgentCard} key=${a.pane_id} a=${a} showBranch=${!grouped} onSelect=${onSelect} onRename=${onRename} />`)}
      `)}
    </div>`;
  }

  // ---- detail / chat ----
  // Collapsible collection of artifact links; each opens in a new tab.
  function Artifacts({ items }){
    const [open, setOpen] = useState(false);
    return html`<div class="artifacts">
      <button class="art-h" type="button" onClick=${() => setOpen(o => !o)}>🔗 Artifacts (${items.length}) <span class="chev">${open ? "▾" : "▸"}</span></button>
      ${open ? html`<div class="art-list">
        ${items.map((u, i) => html`<a class="art-item" key=${i} href=${u} target="_blank" rel="noopener noreferrer" title=${u}>${artLabel(u)}</a>`)}
      </div>` : null}
    </div>`;
  }

  function Detail({ agent, session }){
    const pane = agent.pane_id;
    const status = agent.agent_status || "unknown";

    const taRef = useRef(null);
    const convoRef = useRef(null);
    const pinnedRef = useRef(true);      // stay pinned to bottom unless scrolled up
    const workingSince = useRef(null);
    const [sending, setSending] = useState(false);
    const [sentLog, setSentLog] = useState(() => loadSent(session, pane));
    const [data, setData] = useState({ mode:"loading", msgs:null, readText:"" });
    const [showRun, setShowRun] = useState(false);
    const [preview, setPreview] = useState("…");
    const [choices, setChoices] = useState({ question:"", options:[], index:0, total:0 });
    const [chosen, setChosen] = useState(null);   // option the user tapped (optimistic, until the picker clears)
    const [artifacts, setArtifacts] = useState(() => loadArtifacts(session, pane));
    const [, setTick] = useState(0);     // drives elapsed/preview refresh each poll

    // Track the start of the current working episode (kept through transient
    // blocked/unknown flickers; cleared only when the agent goes idle).
    useEffect(() => {
      if(status === "working"){ if(!workingSince.current) workingSince.current = Date.now(); }
      else if(status === "idle"){ workingSince.current = null; }
    }, [status]);

    // Restore any unsent/failed draft for this pane (survives reload / reconnect).
    useEffect(() => {
      const d = loadDraft(pane);
      if(d && taRef.current){ taRef.current.value = d; fit(); }
    }, []);

    // Poll the transcript (or read fallback) and prune expired pending sends.
    useEffect(() => {
      let alive = true;
      async function refresh(){
        try {
          const tr = await fetchTranscript(pane, session);
          if(!alive) return;
          if(tr){ setData({ mode:"convo", msgs: tr.messages || [], readText:"" }); }
          else { const txt = await fetchRead(pane, session); if(!alive) return; setData({ mode:"text", msgs:null, readText: txt || "" }); }
        } catch(e){ if(alive) setData({ mode:"text", msgs:null, readText:"can't read pane: " + e.message }); }
        if(!alive) return;
        setSentLog(prev => {
          const now = Date.now();
          const live = prev.filter(e => now - e.ts < SENT_TTL);
          if(live.length !== prev.length){ saveSent(session, pane, live); return live; }
          return prev;
        });
        setTick(t => t + 1);
      }
      refresh();
      const id = setInterval(refresh, 1500);
      return () => { alive = false; clearInterval(id); };
    }, [pane, session]);

    // When blocked, poll for a parsed multiple-choice picker so we can render
    // tappable answers instead of raw terminal + generic approve/deny keys.
    // On any change to the picker (a new question in a multi-part ask, or it
    // disappearing) reset the optimistic selection so the next part is answerable.
    const pickerSig = useRef("");
    useEffect(() => {
      if(status !== "blocked"){ setChoices({ question:"", options:[], index:0, total:0 }); setChosen(null); pickerSig.current = ""; return; }
      let alive = true;
      async function tick(){
        try{
          const r = await fetch("/api/pane/choices?"+pq(pane, session), {cache:"no-store"});
          if(!alive || !r.ok) return;
          const c = await r.json();
          const sig = (c.question||"") + "|" + (c.options||[]).map(o => o.n+":"+o.label).join(",");
          if(sig !== pickerSig.current){ pickerSig.current = sig; setChosen(null); }
          setChoices(c);
        }catch{}
      }
      tick();
      const id = setInterval(tick, 1500);
      return () => { alive = false; clearInterval(id); };
    }, [status, pane, session]);

    // Collect any artifact links from the transcript into the (persisted) collection.
    useEffect(() => {
      const texts = [];
      if(data.msgs) for(const m of data.msgs){ if(m.text) texts.push(m.text); }
      if(data.readText) texts.push(data.readText);
      const found = [];
      for(const t of texts){ const mm = t.match(ARTIFACT_RE); if(mm) found.push(...mm); }
      if(!found.length) return;
      setArtifacts(prev => {
        const set = new Set(prev); let changed = false;
        for(const u of found){ if(!set.has(u)){ set.add(u); changed = true; } }
        if(!changed) return prev;
        const next = [...set];
        saveArtifacts(session, pane, next);
        return next;
      });
    }, [data, session, pane]);

    // Keep the panel's terminal preview fresh whenever it's open.
    useEffect(() => {
      if(!showRun) return;
      let alive = true;
      fetchRead(pane, session).then(txt => {
        if(!alive) return;
        const lines = (txt || "").replace(/\s+$/, "").split("\n").slice(-8).join("\n");
        setPreview(lines || "(no recent output)");
      }).catch(() => {});
      return () => { alive = false; };
    }, [showRun, data, pane, session]);

    // Stick to the bottom after any render, but only if the user hasn't scrolled up.
    useLayoutEffect(() => { const c = convoRef.current; if(c && pinnedRef.current) c.scrollTop = c.scrollHeight; });

    function fit(){ const ta = taRef.current; if(!ta) return; ta.style.height = "auto"; ta.style.height = Math.min(ta.scrollHeight, 128) + "px"; }
    function onScroll(){ const c = convoRef.current; if(c) pinnedRef.current = c.scrollHeight - c.scrollTop - c.clientHeight < 80; }
    function onInput(){ fit(); saveDraft(pane, taRef.current.value); }

    async function send(){
      const ta = taRef.current; const text = (ta.value || "").trim(); if(!text) return;
      setSending(true);
      saveDraft(pane, text);                // persist before the round-trip, in case it fails
      ta.value = ""; ta.style.height = "auto";
      // Log the send so it stays visible across refreshes (the transcript/terminal
      // lags the live session); render decides idempotently when it's confirmed.
      setSentLog(prev => { const next = [...prev, { t:text, ts:Date.now() }]; saveSent(session, pane, next); return next; });
      try {
        await sendMsg(pane, session, text);
        clearDraft(pane);                   // actually delivered — drop the cached draft
        toast("Sent");
      } catch(e){
        setSentLog(prev => {                // didn't send — drop the last matching entry
          const next = prev.slice();
          for(let i = next.length - 1; i >= 0; i--){ if(next[i].t === text){ next.splice(i, 1); break; } }
          saveSent(session, pane, next); return next;
        });
        ta.value = text; fit();             // put your text back in the box…
        saveDraft(pane, text);              // …and keep it cached so a reload won't lose it
        toast("Send failed — message kept");
      } finally { setSending(false); }
    }
    async function key(...keys){ try{ await sendKeys(pane, session, keys); }catch(e){ alert("key failed: "+e.message); } }

    // ---- derive what to render ----
    const real = (data.msgs || []).filter(m => (m.text && m.text.trim()) || (m.tools && m.tools.length));
    const act = activityFor(status, data.msgs, workingSince.current);
    const actMode = (act && act.elapsed != null && act.elapsed >= 8) ? "pill" : "dots";
    const now = Date.now();

    let items;
    if(data.mode === "loading"){
      items = html`<div class="hint">loading…</div>`;
    } else if(data.mode === "text"){
      // No structured transcript to reconcile against, so a sent message clears
      // once its text shows up in the terminal output.
      const txt = data.readText || "";
      const pend = sentLog.filter(e => now - e.ts < SENT_TTL).filter(e => !txt.includes(e.t)).map(e => e.t);
      items = [
        html`<${Rendered} key="term" tag="pre" className="term" text=${txt} markdown=${false} />`,
        ...pend.map((pt, i) => html`<${Bubble} key=${"pt" + i} m=${{ role:"user", text:pt }} pending=${true} />`),
      ];
    } else {
      // Sent messages not yet in the transcript stay as pending bubbles. For each
      // text, show only the sends beyond the count already confirmed — so
      // identical duplicates each get a bubble and refreshes never over-consume.
      const realCount = {};
      for(const m of real){ if(m.role === "user"){ const k=(m.text||"").trim(); realCount[k]=(realCount[k]||0)+1; } }
      const seen = {}, pend = [];
      for(const e of sentLog){ if(now - e.ts >= SENT_TTL) continue; seen[e.t]=(seen[e.t]||0)+1; if(seen[e.t] > (realCount[e.t]||0)) pend.push(e.t); }
      const out = [];
      if(!real.length && !pend.length){ out.push(html`<div class="sys" key="none">no messages yet</div>`); }
      let prev = null;
      real.forEach((m, idx) => {
        if(m.role === "assistant" && !(m.text && m.text.trim()) && m.tools && m.tools.length){
          out.push(html`<div class="sys" key=${"m" + idx}>⚙ ${m.tools.map(t=>t.name).join(" · ")}</div>`);   // tool-only turn → system line
        } else {
          out.push(html`<${Bubble} key=${"m" + idx} m=${m} grouped=${prev === m.role} />`);
        }
        prev = m.role;
      });
      pend.forEach((pt, i) => { out.push(html`<${Bubble} key=${"pend" + i} m=${{ role:"user", text:pt }} pending=${true} grouped=${prev === "user"} />`); prev = "user"; });
      items = out;
    }

    const blockedPending = status === "blocked" ? lastPending(data.msgs) : null;

    return html`<div class="detail">
      ${artifacts.length ? html`<${Artifacts} items=${artifacts} />` : null}
      <div class="convo" id="convo" ref=${convoRef} onScroll=${onScroll}>
        <div class="msgs" id="msgs">${items}</div>
        <div class="statusslot" id="statusslot">
          ${status === "working" ? html`
            ${actMode === "pill"
              ? html`<button class="actpill" type="button" onClick=${() => setShowRun(s => !s)}>${pillLabel(act)}</button>`
              : html`<button class="typing" type="button" onClick=${() => setShowRun(s => !s)}><span></span><span></span><span></span></button>`}
            ${showRun ? html`<div class="runpanel">
              <div class="permh runhead">
                <span>what's happening</span>
                <button class="minbtn" type="button" aria-label="minimize" onClick=${() => setShowRun(false)}>✕</button>
              </div>
              <div class="pend">
                ${((act && act.pending) || []).map((t, i) => html`<div class="permname" key=${i}>⚙ ${t.name}${t.summary ? ": " + t.summary : ""}</div>`)}
              </div>
              <pre class="permcmd preview">${preview}</pre>
              <div class="permbtns">
                <button class="key warn" type="button" onClick=${() => { key("C-c"); toast("Ctrl-C sent"); setShowRun(false); }}>⛔ Ctrl-C</button>
                <button class="key" type="button" onClick=${() => { key("Escape"); toast("Esc sent"); setShowRun(false); }}>⎋ Esc</button>
              </div>
            </div>` : null}
          ` : null}
        </div>
      </div>
      <div class="keys" id="keys">
        ${status === "blocked" ? (choices.options && choices.options.length ? html`
          <div class="permcard">
            <div class="permh">⏸ ${choices.question || "Choose an option"}${choices.total > 1 ? ` · question ${choices.index} of ${choices.total}` : ""}</div>
          </div>
          <div class="permbtns choices">
            ${choices.options.map(o => html`
              <button class="key ${o.n === chosen ? "chosen" : (chosen != null ? "dimmed" : (o.selected ? "go" : ""))}" type="button" key=${o.n}
                disabled=${chosen != null}
                onClick=${() => { setChosen(o.n); key(String(o.n)); toast("Chose " + o.n + ". " + o.label); }}>${o.n}. ${o.label}</button>
            `)}
          </div>
          <div class="hint">${chosen != null ? "sent — waiting for the agent…" : "tap an option — it's sent to the agent"}</div>
        ` : html`
          ${blockedPending && blockedPending.length ? html`<div class="permcard">
            <div class="permh">⏸ Waiting for you — wants to:</div>
            ${blockedPending.map((t, i) => html`
              <div class="permname" key=${"n" + i}>${t.name}</div>
              ${t.summary ? html`<pre class="permcmd" key=${"c" + i}>${t.summary}</pre>` : null}
            `)}
          </div>` : null}
          <div class="permbtns">
            <button class="key go" type="button" onClick=${() => { key("Enter"); toast("Approved ✓"); }}>✓ Approve</button>
            <button class="key" type="button" onClick=${() => key("Down")}>↓</button>
            <button class="key" type="button" onClick=${() => key("Up")}>↑</button>
            <button class="key warn" type="button" onClick=${() => { key("Escape"); toast("Denied"); }}>✕ Deny</button>
          </div>
        `) : null}
      </div>
      <div class="prompt">
        <textarea id="msg" rows="1" placeholder="Message this agent…" ref=${taRef} onInput=${onInput}
          onKeyDown=${(e) => { if(e.key === "Enter" && e.shiftKey){ e.preventDefault(); send(); } }}></textarea>
        <button class="send" id="sendbtn" onClick=${send} disabled=${sending}>Send</button>
      </div>
      <div class="hint">types into the live session · Enter = newline · Shift+Enter or Send to send</div>
    </div>`;
  }

  // Poll the aggregate agent list; `poke` forces an immediate refetch after an action.
  function useAgents(){
    const [agents, setAgents] = useState(null);
    const [err, setErr] = useState(null);
    const pokeRef = useRef(null);
    useEffect(() => {
      let alive = true;
      async function tick(){ try{ const a = await fetchAgents(); if(alive){ setAgents(a); setErr(null); } }catch(e){ if(alive) setErr(e.message); } }
      pokeRef.current = tick;
      tick();
      const id = setInterval(tick, 1500);
      return () => { alive = false; clearInterval(id); };
    }, []);
    return { agents, err, poke: () => pokeRef.current && pokeRef.current() };
  }

  function useWide(){
    const [wide, setWide] = useState(() => window.matchMedia("(min-width:820px)").matches);
    useEffect(() => {
      const mq = window.matchMedia("(min-width:820px)");
      const on = () => setWide(mq.matches);
      mq.addEventListener ? mq.addEventListener("change", on) : mq.addListener(on);
      return () => { mq.removeEventListener ? mq.removeEventListener("change", on) : mq.removeListener(on); };
    }, []);
    return wide;
  }

  function App(){
    const { agents, err, poke } = useAgents();
    const wide = useWide();
    const [chosenSession, setChosenSession] = useState(null);   // set once a session gate card is picked
    const [selectedPane, setSelectedPane] = useState(null);     // selected agent within the active session
    const [sheetOpen, setSheetOpen] = useState(false);

    const list = agents || [];
    const { map, keys } = sessionSummary(list);
    const gated = keys.length > 1;                              // 2+ sessions → the session gate is in play
    const showGate = gated && chosenSession == null;
    const activeSession = gated ? chosenSession : (keys[0] || "");
    const mine = list.filter(a => (a.session||"") === (activeSession||""))
                     .sort((a,b)=>(STATE_ORDER[a.agent_status]??3)-(STATE_ORDER[b.agent_status]??3));
    const selAgent = (!showGate && selectedPane) ? mine.find(a => a.pane_id === selectedPane) : null;
    const inDetail = !wide && !!selAgent;                       // narrow: a selected agent is a full-screen detail

    // ---- actions ----
    async function renameAgent(a){
      const name = prompt("Rename agent (leave blank to reset):", a.name || "");
      if(name === null) return;
      try { await sendRename(a.pane_id, a.session, name.trim()); poke(); }
      catch(e){ alert("rename failed: "+e.message); }
    }
    async function newWorktree(){
      const base = list.find(a=>a.focused) || list[0];
      if(!base){ alert("No agent to derive a repo from."); return; }
      const name = prompt(`New worktree — branch name\n(repo: ${shortPath(base.cwd)}, launches a Claude agent)`, "");
      if(name === null) return;
      const n = name.trim(); if(!n) return;
      try { await sendNewWorktree(base.cwd, n, base.session); setTimeout(poke, 600); }
      catch(e){ alert("worktree create failed: "+e.message); }
    }
    async function newAgent(){
      const base = list.find(a=>a.focused) || list[0];
      const dir = prompt("New agent — working directory (opens a new tab, no branch):", base ? base.cwd : "");
      if(dir === null) return;
      const d = dir.trim(); if(!d) return;
      try { await sendNewAgent(d, base ? base.session : ""); setTimeout(poke, 600); }
      catch(e){ alert("agent start failed: "+e.message); }
    }
    function onBack(){ if(inDetail){ setSelectedPane(null); } else { setChosenSession(null); setSelectedPane(null); } }
    function onSelectSession(name){ setChosenSession(name); setSelectedPane(null); }

    // ---- header ----
    const backVis = showGate ? false : (inDetail ? true : gated);
    const newwtVis = !showGate && !inDetail;
    let title, count;
    if(showGate){
      const totalBlocked = keys.reduce((s,k)=>s+map[k].blocked,0);
      title = html`<span class="g">❯</span> herd<span class="g">view</span>`;
      count = `${keys.length} sessions` + (totalBlocked ? ` · ${totalBlocked} need you` : "");
    } else if(inDetail){
      title = html`${(selAgent.name || selAgent.agent)} <span class="g">·</span> <span style="font-family:var(--mono);font-size:.78rem;color:var(--muted)" title=${selAgent.pane_id}>${prettyPane(selAgent.pane_id)}</span>`;
      const blocked = mine.filter(a=>a.agent_status==="blocked").length;
      count = `${mine.length} agent${mine.length===1?"":"s"}` + (blocked?` · ${blocked} need you`:"");
    } else {
      title = gated ? html`<span class="g">❯</span> ${activeSession||"session"}` : html`<span class="g">❯</span> herd<span class="g">view</span>`;
      const blocked = mine.filter(a=>a.agent_status==="blocked").length;
      count = `${mine.length} agent${mine.length===1?"":"s"}` + (blocked?` · ${blocked} need you`:"");
    }

    // ---- body ----
    let body;
    if(agents === null){
      body = html`<main>${err ? html`<div class="error">can't reach herdr: ${err}</div>` : html`<div class="empty">Loading agents…</div>`}</main>`;
    } else if(showGate){
      body = html`<main><div class="scroller">
        ${keys.map(k => html`<${SessionCard} key=${k} name=${k} info=${map[k]} onClick=${() => onSelectSession(k)} />`)}
      </div></main>`;
    } else {
      body = html`<main class=${wide ? "wide-split" : ""}>
        <div class="split" data-sel=${selAgent ? "1" : "0"}>
          <div class="pane-list"><${Grid} agents=${mine} onSelect=${a => setSelectedPane(a.pane_id)} onRename=${renameAgent} /></div>
          <div class="pane-detail">
            ${selAgent
              ? html`<${Detail} key=${(activeSession||"") + ":" + selectedPane} agent=${selAgent} session=${activeSession} />`
              : html`<div class="pane-empty">Select an agent</div>`}
          </div>
        </div>
      </main>`;
    }

    const base = list.find(a=>a.focused) || list[0];
    const repo = base ? shortPath(base.cwd) : "—";

    return html`<${Fragment}>
      <header>
        <button class="back" id="back" hidden=${!backVis} onClick=${onBack}>← back</button>
        <h1 id="title">${title}</h1>
        <span class="count" id="count">${count}</span>
        <button class="newwt" id="newwt" type="button" title="new worktree" hidden=${!newwtVis} onClick=${() => setSheetOpen(true)}>＋</button>
      </header>
      ${body}
      ${(!showGate && !inDetail && agents !== null) ? html`<footer id="foot">mirroring this herdr session · v0.4</footer>` : null}
      ${sheetOpen ? html`<div class="sheet-ov" onClick=${e => { if(e.target === e.currentTarget) setSheetOpen(false); }}>
        <div class="sheet">
          <div class="sheet-h">new in ${repo}</div>
          <button class="sheet-b" data-act="agent" onClick=${() => { setSheetOpen(false); newAgent(); }}>＋ New agent<span>a fresh tab running Claude — no branch</span></button>
          <button class="sheet-b" data-act="worktree" onClick=${() => { setSheetOpen(false); newWorktree(); }}>⎇ New worktree<span>new git branch + a Claude agent</span></button>
          <button class="sheet-b cancel" onClick=${() => setSheetOpen(false)}>Cancel</button>
        </div>
      </div>` : null}
    </${Fragment}>`;
  }

  render(html`<${App} />`, document.getElementById("root"));
</script>
</body>
</html>
