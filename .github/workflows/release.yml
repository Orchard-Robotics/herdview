name: release

# Cut a release by pushing a version tag:  git tag v0.2.0 && git push origin v0.2.0
# This builds the cross-platform binaries, checksums them, and publishes a GitHub
# Release. scripts/fetch.sh downloads the matching asset from /releases/latest/
# at `herdr plugin install` time, so binaries never live in git.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # required to create the Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build cross-platform binaries
        run: sh scripts/build.sh

      - name: Generate checksums
        working-directory: bin
        run: sha256sum herdview_* > SHA256SUMS

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            bin/herdview_linux_amd64 \
            bin/herdview_linux_arm64 \
            bin/herdview_macos_amd64 \
            bin/herdview_macos_arm64 \
            bin/SHA256SUMS \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
