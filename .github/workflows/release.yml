name: release

# Cross-compile static binaries for every platform herdview supports and attach
# them to the GitHub Release. `scripts/fetch.sh` downloads the matching asset at
# `herdr plugin install` time, so end users never need a Go toolchain.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,  goarch: amd64, asset: herdview_linux_amd64 }
          - { goos: linux,  goarch: arm64, asset: herdview_linux_arm64 }
          - { goos: darwin, goarch: amd64, asset: herdview_macos_amd64 }
          - { goos: darwin, goarch: arm64, asset: herdview_macos_arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }
      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags "-s -w" -o "${{ matrix.asset }}" ./cmd/herdview
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
